<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 210 44" role="img" aria-label="On-Duty Masters">
  <defs>
    <linearGradient id="odm-g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#496DEE"/>
      <stop offset="100%" stop-color="#6B8DF5"/>
    </linearGradient>
    <linearGradient id="odm-g2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#496DEE"/>
      <stop offset="100%" stop-color="#6B8DF5"/>
    </linearGradient>
  </defs>

  <!-- Octagon badge outline -->
  <path d="M40,22 L34.55,9.45 L22,4 L9.45,9.45 L4,22 L9.45,34.55 L22,40 L34.55,34.55 Z"
        fill="none" stroke="url(#odm-g)" stroke-width="1.4" opacity="0.55"/>

  <!-- 4-pointed sparkle (nöbet yıldızı) -->
  <path d="M22,12 L25.12,18.88 L32,22 L25.12,25.12 L22,32 L18.88,25.12 L12,22 L18.88,18.88 Z"
        fill="url(#odm-g)"/>

  <!-- ON-DUTY -->
  <text x="50" y="19"
        font-family="'Plus Jakarta Sans', Arial, sans-serif"
        font-size="12" font-weight="800"
        letter-spacing="2.8"
        fill="#F0F0F5">ON-DUTY</text>

  <!-- MASTERS -->
  <text x="50" y="37"
        font-family="'Plus Jakarta Sans', Arial, sans-serif"
        font-size="12" font-weight="800"
        letter-spacing="2.8"
        fill="url(#odm-g2)">MASTERS</text>
</svg>
